const store = {
  get(key) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } },
  set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} },
};

};

function getMealTimeInfo(meal) {
  const fw = FRAMEWORKS[meal.framework];
  const isLong = fw.totalMin > 30;
  const timeLabel = meal.framework === "slow-cooker"
    ? `${fw.active} active · 7+ hrs total`
    : fw.totalMin > 30
      ? `${fw.active} active · ~${fw.totalMin} min total`
      : `~${fw.totalMin} min`;
  return { isLong, timeLabel, fw };
}

// ─── STEP TEMPLATES ───
function sheetPanSteps(m) {
  const steps = [
    { text: "Line the sheet pan with foil or parchment paper.", timer: null },
    { text: "Turn the oven on to 400°F — same temperature as always.", timer: null },
    { text: `Place ${m.protein} on one side of the sheet pan.`, timer: null },
    { text: `Pour ${m.veg1} and ${m.veg2} on the other side of the pan. Spread them out.`, timer: null },
    { text: "Drizzle 1 Oil Spoon of garlic-infused olive oil over everything.", timer: null },
    { text: `Sprinkle 2 Seasoning Pinches of the ${m.blend.emoji} ${m.blend.name} blend over everything.`, timer: null },
  ];
  if (m.extra) steps.push({ text: m.extra, timer: null });
  steps.push({ text: "Put the pan in the oven.", timer: 25 * 60 });
  steps.push({ text: "Take the pan out of the oven. Turn the oven off. ⚠️ Pan is hot — use oven mitts.", timer: null });
  steps.push({ text: `Microwave one ${m.grain} packet — 90 seconds.`, timer: 90 });
  steps.push({ text: "Grain into container. Protein and veg on top. Done! 🎉", timer: null });
  return steps;
}

function skilletSteps(m) {
  const isEgg = m.proteinType === "eggs";
  const proteinTime = isEgg ? 3 * 60 : 5 * 60;
  const steps = [
    { text: "Put the large skillet on the stove. Medium-high heat.", timer: null },
    { text: "Add 1 Oil Spoon of garlic-infused olive oil. Let it heat for a moment.", timer: null },
    { text: `Add ${m.protein} to the skillet. ${m.proteinCue || "Cook until done."}`, timer: proteinTime },
    { text: `Add ${m.veg1} and ${m.veg2}. Stir. Cook until warmed through.`, timer: 4 * 60 },
    { text: `Sprinkle 2 Seasoning Pinches of the ${m.blend.emoji} ${m.blend.name} blend.${m.liquid ? ` Add 1 Sauce Splash of ${m.liquid}.` : ""} Stir.`, timer: null },
    { text: "Turn the stove off.", timer: null },
  ];
  if (m.base && m.base.includes("packet")) {
    steps.push({ text: `Microwave one ${m.base} — 90 seconds.`, timer: 90 });
    steps.push({ text: "Serve skillet food over the grain in a container. Done! 🎉", timer: null });
  } else if (m.base) {
    steps.push({ text: `Serve in/on ${m.base}. Into container. Done! 🎉`, timer: null });
  } else {
    steps.push({ text: "Into container. Done! 🎉", timer: null });
  }
  return steps;
}

function bowlSteps(m) {
  const steps = [
    { text: `Microwave one ${m.grain} packet — 90 seconds. Pour into bowl or container.`, timer: 90 },
  ];
  // Protein step — add reheat timer if it's leftover
  if (m.proteinNote && m.proteinNote.includes("Reheat")) {
    steps.push({ text: `Put ${m.protein} on a plate. Microwave about 60 seconds to reheat.`, timer: 60 });
    steps.push({ text: "Add the reheated protein on top of the grain.", timer: null });
  } else {
    steps.push({ text: `Add ${m.protein} on top.`, timer: null });
  }
  // Veg steps — separate out microwaving from adding
  const needsMicro1 = m.veg1Prep && m.veg1Prep.includes("microwave");
  const needsMicro2 = m.veg2Prep && m.veg2Prep.includes("microwave");
  if (needsMicro1 || needsMicro2) {
    const microItems = [];
    if (needsMicro1) microItems.push(m.veg1);
    if (needsMicro2) microItems.push(m.veg2);
    steps.push({ text: `Put ${microItems.join(" and ")} in a bowl. Microwave to thaw and warm.`, timer: 150 });
    const rawItems = [];
    if (!needsMicro1) rawItems.push(m.veg1);
    if (!needsMicro2) rawItems.push(m.veg2);
    if (rawItems.length > 0) {
      steps.push({ text: `Add the microwaved veg and ${rawItems.join(" and ")} to the bowl.`, timer: null });
    } else {
      steps.push({ text: "Add the microwaved veg to the bowl.", timer: null });
    }
  } else {
    steps.push({ text: `Add ${m.veg1} and ${m.veg2}.`, timer: null });
  }
  steps.push({ text: `Drizzle dressing: 1 Oil Spoon olive oil + 1 Sauce Splash ${m.acid} + 1 Seasoning Pinch ${m.blend.emoji} ${m.blend.name} blend.`, timer: null });
  if (m.topping) steps.push({ text: `Sprinkle a small handful of ${m.topping} on top.`, timer: null });
  steps.push({ text: "Done! 🎉", timer: null });
  return steps;
}

function slowCookerSteps(m) {
  const steps = [
    { text: `Put ${m.protein} in the slow cooker.${m.proteinNote ? ` ${m.proteinNote}` : ""}`, timer: null },
    { text: `Pour ${m.veg1} and ${m.veg2} on top.`, timer: null },
    { text: `Pour ${m.liquidDesc} over everything.`, timer: null },
    { text: `Drizzle 1 Oil Spoon garlic-infused olive oil. Sprinkle 3 Seasoning Pinches of the ${m.blend.emoji} ${m.blend.name} blend.`, timer: null },
  ];
  if (m.extra) steps.push({ text: m.extra, timer: null });
  steps.push({ text: "Put the lid on. Set to Low. You're done for now! The app will time 7 hours. 💡 Tip: also set a phone alarm as backup in case the app closes.", timer: 7 * 60 * 60 });
  if (m.stirIn) steps.push({ text: `Stir in ${m.stirIn}. Put the lid back on and wait 15 minutes.`, timer: 15 * 60 });
  steps.push({ text: `Microwave one ${m.grain} packet — 90 seconds.`, timer: 90 });
  steps.push({ text: "Grain in container. Slow cooker food on top.", timer: null });
  steps.push({ text: "Portion remaining food into containers. Label each with today's date (tape + marker).", timer: null });
  steps.push({ text: "Turn off and unplug the slow cooker. Done! 🎉", timer: null });
  return steps;
}

// ─── ROTATION LOGIC ───
// Canned-protein bowl IDs that don't need leftovers
const CANNED_BOWL_IDS = ["C2","C3","C5","C7"]; // lentils, chickpeas, eggs

function generateWeekRotation(excludedProteins = [], startDay = 0) {
  const available = ALL_MEALS.filter(m => !excludedProteins.includes(m.proteinType));
  const byFramework = { "sheet-pan": [], skillet: [], bowl: [], "slow-cooker": [] };
  available.forEach(m => byFramework[m.framework].push(m));
  Object.keys(byFramework).forEach(k => {
    byFramework[k] = byFramework[k].sort(() => Math.random() - 0.5);
  });
  const week = [];
  const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  // Standard supply chain pattern: cook, leftovers, leftovers, cook, leftovers, cook, cook
  const pattern = ["slow-cooker","bowl","bowl","sheet-pan","bowl","skillet","sheet-pan"];
  const counters = { "sheet-pan":0, skillet:0, bowl:0, "slow-cooker":0 };
  for (let i = 0; i < 7; i++) {
    const dayIdx = (startDay + i) % 7;
    const fw = pattern[i];
    const pool = byFramework[fw];
    const idx = counters[fw] % pool.length;
    counters[fw]++;
    week.push({ day: dayNames[dayIdx], meal: pool[idx], containers: fw === "slow-cooker" ? 4 : fw === "bowl" ? 1 : 2, dayIdx });
  }
  return week;
}

function generateFreshStartRotation(excludedProteins = []) {
  const todayDow = new Date().getDay();
  const available = ALL_MEALS.filter(m => !excludedProteins.includes(m.proteinType));
  const byFramework = { "sheet-pan": [], skillet: [], bowl: [], "slow-cooker": [] };
  available.forEach(m => byFramework[m.framework].push(m));
  Object.keys(byFramework).forEach(k => {
    byFramework[k] = byFramework[k].sort(() => Math.random() - 0.5);
  });
  
  // Fresh start pattern: no bowls until after a cook that produces leftovers
  // Day 1: slow-cooker (produces 3-4 containers), Day 2-3: bowl (fed by day 1)
  // Day 4: sheet-pan/skillet, Day 5: bowl, Day 6: skillet/sheet-pan, Day 7: sheet-pan
  const pattern = ["slow-cooker","bowl","bowl","sheet-pan","bowl","skillet","sheet-pan"];
  // But on days 2-3 and 5, only allow canned-protein bowls if no leftovers are guaranteed
  // Since day 1 is always slow-cooker (produces leftovers), days 2-3 are fine
  // Day 5 bowl follows day 4 sheet-pan which may produce leftovers — use canned-safe bowls as fallback
  
  const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const counters = { "sheet-pan":0, skillet:0, bowl:0, "slow-cooker":0 };
  const week = [];
  
  for (let i = 0; i < 7; i++) {
    const dayIdx = (todayDow + i) % 7;
    const fw = pattern[i];
    const pool = byFramework[fw];
    const idx = counters[fw] % pool.length;
    counters[fw]++;
    week.push({ day: dayNames[dayIdx], meal: pool[idx], containers: fw === "slow-cooker" ? 4 : fw === "bowl" ? 1 : 2, dayIdx });
  }
  return week;
}

// ─── SHOPPING LIST ───
function generateShoppingList(weekRotation) {
  const frozenVegCount = {};
  const proteinCount = {};
  const grainCount = {};
  const cannedCount = {};
  const freshItems = {};
  const extras = new Set();

  weekRotation.forEach(({ meal: m }) => {
    const countFrozen = (vegStr) => {
      if (!vegStr || !vegStr.includes("frozen")) return;
      const name = vegStr.replace("frozen ", "").replace(/\(.*\)/, "").trim();
      const clean = name.charAt(0).toUpperCase() + name.slice(1);
      frozenVegCount[clean] = (frozenVegCount[clean] || 0) + (m.framework === "slow-cooker" ? 2 : 1);
    };
    countFrozen(m.veg1); countFrozen(m.veg2);
    if (m.stirIn?.includes("frozen")) {
      const name = m.stirIn.replace("frozen ","").replace("a handful of ","").trim();
      frozenVegCount[name.charAt(0).toUpperCase()+name.slice(1)] = (frozenVegCount[name.charAt(0).toUpperCase()+name.slice(1)]||0)+1;
    }
    proteinCount[m.proteinType] = (proteinCount[m.proteinType]||0)+1;
    if (m.grain) { grainCount[m.grain] = (grainCount[m.grain]||0) + (m.framework==="slow-cooker"?4:1); }
    if (m.veg1?.includes("baby spinach")||m.veg2?.includes("baby spinach")||m.stirIn?.includes("baby spinach")) freshItems["Baby spinach"]=(freshItems["Baby spinach"]||0)+1;
    if (m.veg1?.includes("cherry tomato")||m.veg2?.includes("cherry tomato")) freshItems["Cherry/grape tomatoes"]=(freshItems["Cherry/grape tomatoes"]||0)+1;
    if (m.proteinType==="lentils") cannedCount["Canned lentils"]=(cannedCount["Canned lentils"]||0)+(m.framework==="slow-cooker"?2:1);
    if (m.proteinType==="chickpeas") cannedCount["Canned chickpeas"]=(cannedCount["Canned chickpeas"]||0)+1;
    if (m.liquidDesc?.includes("diced tomatoes")) cannedCount["Canned diced tomatoes (low sodium)"]=(cannedCount["Canned diced tomatoes (low sodium)"]||0)+1;
    if (m.liquidDesc?.includes("broth")) cannedCount["Low-sodium broth"]=(cannedCount["Low-sodium broth"]||0)+1;
    if (m.base?.includes("tortilla")) extras.add("Corn tortillas — 1 package");
    if (m.base?.includes("sourdough")) extras.add("Sourdough spelt bread — 1 loaf");
  });

  const result = { "🧊 Freezer":[], "🥬 Fresh":[], "🥫 Pantry":[], "🧃 Snack Zone":[] };

  Object.entries(frozenVegCount).sort().forEach(([name,uses]) => {
    const bags = Math.ceil(uses/3);
    result["🧊 Freezer"].push(`${name} — ${bags} bag${bags>1?"s":""}`);
  });

  const pLabels = {
    chicken:(n)=>`Chicken tenders/strips — about ${Math.ceil(n*0.5)} lbs`,
    turkey:(n)=>`Turkey breast — about ${Math.ceil(n*0.5)} lb${Math.ceil(n*0.5)>1?"s":""}`,
    tofu:(n)=>`Firm/extra-firm tofu — ${n} package${n>1?"s":""}`,
    tempeh:(n)=>`Tempeh — ${n} package${n>1?"s":""}`,
    eggs:()=>"Eggs — 1 dozen",
  };
  Object.entries(proteinCount).sort().forEach(([t,c])=>{ if(pLabels[t]) result["🥬 Fresh"].push(pLabels[t](c)); });
  Object.entries(freshItems).sort().forEach(([name,uses])=>{
    if(name==="Baby spinach") result["🥬 Fresh"].push(`Baby spinach — ${uses<=3?"1 bag":"2 bags"}`);
    if(name==="Cherry/grape tomatoes") result["🥬 Fresh"].push(`Cherry/grape tomatoes — ${uses<=3?"1 pint":"2 pints"}`);
  });
  extras.forEach(e=>{ if(e.includes("bread")||e.includes("loaf")) result["🥬 Fresh"].push(e); });

  Object.entries(grainCount).sort().forEach(([g,c])=>result["🥫 Pantry"].push(`Microwave ${g} packets — ${c} packets`));
  Object.entries(cannedCount).sort().forEach(([n,c])=>result["🥫 Pantry"].push(`${n} — ${c} can${c>1?"s":""}`));
  extras.forEach(e=>{ if(!e.includes("bread")&&!e.includes("loaf")) result["🥫 Pantry"].push(e); });
  result["🥫 Pantry"].push("Garlic-infused olive oil — check if low","Extra virgin olive oil — check if low","Low-sodium tamari — check if low","Rice vinegar — check if low","Lemons and/or limes — 3-4");
  result["🧃 Snack Zone"].push("Berries / kiwi / clementines — a few days' worth","Lactose-free yogurt (unsweetened) — 4-6 cups","Pumpkin seeds — 1 bag (check if low)","Walnuts — 1 bag (check if low)","Pecans — 1 bag (check if low)","Peanut butter — 1 jar (check if low)","Rice cakes — 1 package (check if low)");
  return result;
}

// ─── TIMER COMPONENT ───
function Timer({ seconds, onComplete }) {
  const [remaining, setRemaining] = useState(seconds);
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running && remaining > 0) {
      intervalRef.current = setInterval(() => setRemaining(r => r - 1), 1000);
    } else if (remaining <= 0 && running) {
      setRunning(false);
      try { 
        const audio = new AudioContext();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.connect(gain); gain.connect(audio.destination);
        osc.frequency.value = 880; gain.gain.value = 0.3;
        osc.start(); setTimeout(() => { osc.stop(); audio.close(); }, 1000);
      } catch {}
      if (onComplete) onComplete();
    }
    return () => clearInterval(intervalRef.current);
  }, [running, remaining]);

  const hrs = Math.floor(remaining / 3600);
  const mins = Math.floor((remaining % 3600) / 60);
  const secs = remaining % 60;
  const pct = ((seconds - remaining) / seconds) * 100;
  const timeDisplay = hrs > 0
    ? `${hrs}:${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`
    : `${mins}:${secs.toString().padStart(2, "0")}`;

  return (
    <div style={{ margin: "16px 0" }}>
      {!running && remaining === seconds ? (
        <button onClick={() => setRunning(true)} style={{
          background: "#2D6A4F", color: "#fff", border: "none", borderRadius: 12,
          padding: "14px 32px", fontSize: 18, fontWeight: 600, cursor: "pointer",
        }}>⏱ Start Timer ({hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m ${secs}s`})</button>
      ) : (
        <div style={{ background: "#F5F0EB", borderRadius: 16, padding: 20, textAlign: "center" }}>
          <div style={{
            fontSize: hrs > 0 ? 40 : 48, fontWeight: 700, fontFamily: "'DM Mono', monospace",
            color: remaining <= 10 ? "#DC2626" : "#2D6A4F", letterSpacing: 2,
          }}>{timeDisplay}</div>
          <div style={{ background: "#D4C9BE", borderRadius: 8, height: 8, margin: "12px 0", overflow: "hidden" }}>
            <div style={{ background: "#2D6A4F", height: "100%", width: `${pct}%`, transition: "width 1s linear", borderRadius: 8 }} />
          </div>
          {remaining <= 0 && <div style={{ fontSize: 20, fontWeight: 700, color: "#2D6A4F", marginTop: 8 }}>✅ Timer done!</div>}
          {running && remaining > 0 && (
            <button onClick={() => setRunning(false)} style={{
              marginTop: 8, background: "transparent", border: "1px solid #D4C9BE",
              borderRadius: 8, padding: "8px 20px", color: "#8B7E6A", fontSize: 14, cursor: "pointer",
            }}>Pause</button>
          )}
          {!running && remaining > 0 && remaining < seconds && (
            <button onClick={() => setRunning(true)} style={{
              marginTop: 8, background: "#2D6A4F", border: "none",
              borderRadius: 8, padding: "8px 20px", color: "#fff", fontSize: 14, cursor: "pointer",
            }}>Resume</button>
          )}
        </div>
      )}
    </div>
  );
}

// ─── COOKING SCREEN ───
function CookingScreen({ meal, onDone }) {
  const steps = getSteps(meal);
  const [currentStep, setCurrentStep] = useState(0);
  const fw = FRAMEWORKS[meal.framework];

  return (
    <div style={{ minHeight: "100vh", background: "#FDFBF7", padding: "20px 16px" }}>
      <div style={{ maxWidth: 480, margin: "0 auto" }}>
        <button onClick={onDone} style={{
          background: "none", border: "none", fontSize: 16, color: "#8B7E6A", cursor: "pointer", padding: "8px 0",
        }}>← Back</button>
        <div style={{ textAlign: "center", margin: "8px 0 20px" }}>
          <span style={{ fontSize: 32 }}>{fw.emoji}</span>
          <h2 style={{ fontSize: 20, fontWeight: 700, color: "#3D3427", margin: "4px 0" }}>{meal.name}</h2>
          <div style={{
            display: "inline-block", background: meal.blend.bg, color: meal.blend.color,
            padding: "4px 12px", borderRadius: 20, fontSize: 14, fontWeight: 600,
          }}>{meal.blend.emoji} {meal.blend.name} blend</div>
          <div style={{ fontSize: 13, color: "#8B7E6A", marginTop: 8 }}>
            {getMealTimeInfo(meal).timeLabel}
          </div>
        </div>

        {/* Progress bar */}
        <div style={{ display: "flex", gap: 4, margin: "0 0 24px" }}>
          {steps.map((_, i) => (
            <div key={i} style={{
              flex: 1, height: 6, borderRadius: 3,
              background: i < currentStep ? "#2D6A4F" : i === currentStep ? "#52B788" : "#E8E0D5",
            }} />
          ))}
        </div>

        {/* Completed steps */}
        {steps.slice(0, currentStep).map((step, i) => (
          <div key={i} style={{
            padding: "12px 16px", marginBottom: 8, borderRadius: 12,
            background: "#F0ECE4", color: "#A09888", fontSize: 15, lineHeight: 1.5,
          }}><span style={{ marginRight: 8 }}>✅</span>{step.text}</div>
        ))}

        {/* Current step */}
        {currentStep < steps.length && (
          <div style={{
            padding: "24px 20px", marginBottom: 16, borderRadius: 16,
            background: "#fff", border: "2px solid #2D6A4F",
            boxShadow: "0 4px 20px rgba(45,106,79,0.1)",
          }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#2D6A4F", marginBottom: 8 }}>
              STEP {currentStep + 1} OF {steps.length}
            </div>
            <div style={{ fontSize: 20, fontWeight: 500, color: "#3D3427", lineHeight: 1.5 }}>
              {steps[currentStep].text}
            </div>
            {steps[currentStep].timer && <Timer key={currentStep} seconds={steps[currentStep].timer} />}
            <button onClick={() => {
              if (currentStep < steps.length - 1) setCurrentStep(currentStep + 1);
              else onDone();
            }} style={{
              width: "100%", marginTop: 16, background: "#2D6A4F", color: "#fff",
              border: "none", borderRadius: 12, padding: "16px", fontSize: 18, fontWeight: 700, cursor: "pointer",
            }}>
              {currentStep < steps.length - 1 ? "Done ✓ — Next Step" : "All Done! 🎉"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

                <div style={{ fontSize: 13, color: "#5C5040", lineHeight: 1.6 }}>
                  <strong>Active time:</strong> ~5 minutes &nbsp;·&nbsp; <strong>Total time:</strong> ~5 minutes<br/>
                  Microwave a grain packet. Add leftover protein (or canned lentils/chickpeas). Add veg. Drizzle dressing. Done. The lowest-effort option — uses leftovers from other frameworks or pantry staples.
                </div>
              </div>

              <div style={{ background: "#fff", borderRadius: 12, padding: 16, marginBottom: 10, border: "1px solid #E8E0D5" }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#3D3427", marginBottom: 6 }}>🫕 Slow Cooker <span style={{ fontSize: 11, color: "#B45309", background: "#FEF3C7", padding: "2px 8px", borderRadius: 8, fontWeight: 700, marginLeft: 6 }}>⏳ long cook</span></div>
                <div style={{ fontSize: 13, color: "#5C5040", lineHeight: 1.6 }}>
                  <strong>Active time:</strong> ~8 minutes (morning) &nbsp;·&nbsp; <strong>Total time:</strong> 7+ hours unattended<br/>
                  Put protein, frozen veg, and liquid in the slow cooker in the morning. Walk away. Food is ready when you're hungry. Makes 3-4 containers — extras become Assembly Bowl protein for the next few days.
                </div>
              </div>
            </div>

            {/* How they connect */}
            <div style={{ marginBottom: 28 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#3D3427", marginBottom: 8, paddingBottom: 4, borderBottom: "2px solid #E8E0D5" }}>
                How the Frameworks Feed Each Other
              </div>
              <div style={{ background: "#F5F0EB", borderRadius: 12, padding: 16, fontSize: 13, color: "#5C5040", lineHeight: 1.7 }}>
                <strong>Slow Cooker</strong> and <strong>Sheet Pan</strong> meals produce extra portions. Those extras go into containers in the fridge. On the following days, <strong>Assembly Bowl</strong> meals use that leftover protein — so you barely cook but still eat a full meal. If no leftovers are available, Assembly Bowls use canned lentils or chickpeas instead.
                <br/><br/>
                A typical week: Slow Cooker → Bowl → Bowl → Sheet Pan → Bowl → Skillet → Sheet Pan. <strong>You actively cook about 3-4 times per week.</strong> The app handles all this scheduling automatically.
              </div>
            </div>

            {/* Tools You Need */}
            <div style={{ marginBottom: 28 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#3D3427", marginBottom: 12, paddingBottom: 4, borderBottom: "2px solid #E8E0D5" }}>
                Tools You Need
              </div>

              <div style={{ fontSize: 13, fontWeight: 700, color: "#2D6A4F", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.5 }}>Cooking Vessels</div>
              {[
                ["1 sheet pan", "For Sheet Pan meals. Line with foil for zero cleanup."],
                ["1 large non-stick skillet", "For One-Skillet meals."],
                ["1 slow cooker", "Basic model — just needs Low/High setting."],
                ["1 microwave-safe bowl", "For Assembly Bowl meals — microwave frozen veg in this before adding to container."],
                ["Oven mitts", "Sheet pan is hot!"],
              ].map(([name, note]) => (
                <div key={name} style={{ padding: "10px 14px", marginBottom: 4, borderRadius: 10, background: "#fff", border: "1px solid #E8E0D5", fontSize: 14, color: "#3D3427" }}>
                  <strong>{name}</strong> <span style={{ color: "#8B7E6A", fontSize: 12 }}>— {note}</span>
                </div>
              ))}

              <div style={{ fontSize: 13, fontWeight: 700, color: "#2D6A4F", marginBottom: 6, marginTop: 16, textTransform: "uppercase", letterSpacing: 0.5 }}>Measurement Tools (3 total)</div>
              {[
                ["Oil Spoon", "A tablespoon-ish spoon. Lives next to the oil bottle. One spoonful = right amount."],
                ["Seasoning Pinch", "A half-teaspoon scoop inside each seasoning blend jar. One level pinch per use."],
                ["Sauce Splash", "A 2-tablespoon small ladle/spoon for tamari, vinegar, lemon juice."],
              ].map(([name, note]) => (
                <div key={name} style={{ padding: "10px 14px", marginBottom: 4, borderRadius: 10, background: "#fff", border: "1px solid #E8E0D5", fontSize: 14, color: "#3D3427" }}>
                  <strong>{name}</strong> <span style={{ color: "#8B7E6A", fontSize: 12 }}>— {note}</span>
                </div>
              ))}

              <div style={{ fontSize: 13, fontWeight: 700, color: "#2D6A4F", marginBottom: 6, marginTop: 16, textTransform: "uppercase", letterSpacing: 0.5 }}>Storage & Supplies</div>
              {[
                ["8-10 single-portion containers", "Microwave-safe, uniform size. One container = one meal. Eat from the container."],
                ["Blue painter's tape + Sharpie", "Label containers with today's date when food goes in the fridge."],
                ["Foil or parchment paper", "Line the sheet pan before every Sheet Pan meal. Zero cleanup."],
              ].map(([name, note]) => (
                <div key={name} style={{ padding: "10px 14px", marginBottom: 4, borderRadius: 10, background: "#fff", border: "1px solid #E8E0D5", fontSize: 14, color: "#3D3427" }}>
                  <strong>{name}</strong> <span style={{ color: "#8B7E6A", fontSize: 12 }}>— {note}</span>
                </div>
              ))}

              <div style={{ background: "#E8F5E9", borderRadius: 12, padding: "14px 16px", marginTop: 12, fontSize: 13, color: "#166534", lineHeight: 1.5 }}>
                ✅ <strong>What you DON'T need:</strong>
                <br/>• No cutting board or knife — all veg is frozen pre-cut, protein is tenders or hand-broken
                <br/>• No pot — grains are 90-second microwave packets
                <br/>• No measuring cups or scale — the three tools above are the only measurements
                <br/>• No plates or bowls — the containers are both storage and serving dish. Eat from the container.
              </div>
            </div>

            {/* Seasoning Blends */}
            <div style={{ marginBottom: 28 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#3D3427", marginBottom: 12, paddingBottom: 4, borderBottom: "2px solid #E8E0D5" }}>
                Seasoning Blends (pre-mix into jars)
              </div>
              <p style={{ fontSize: 13, color: "#8B7E6A", marginBottom: 12 }}>Mix these once every few weeks. Put a Seasoning Pinch scoop inside each jar. Partner task.</p>

              {[
                { ...BLENDS.mediterranean, contents: "Dried oregano, dried thyme, black pepper, pinch of salt" },
                { ...BLENDS.warmSpice, contents: "Cumin, paprika, ground coriander, turmeric" },
                { ...BLENDS.asian, contents: "Ground ginger (also uses tamari + rice vinegar from bottles)" },
                { ...BLENDS.herbGarden, contents: "Dried basil, dried parsley, dried rosemary, black pepper" },
                { ...BLENDS.smoky, contents: "Smoked paprika, cumin, black pepper" },
              ].map(b => (
                <div key={b.name} style={{ padding: "12px 14px", marginBottom: 6, borderRadius: 10, background: b.bg, border: `1px solid ${b.color}22` }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: b.color, marginBottom: 4 }}>{b.emoji} {b.name}</div>
                  <div style={{ fontSize: 13, color: "#5C5040" }}>{b.contents}</div>
                </div>
              ))}

              <div style={{ background: "#FEF3C7", borderRadius: 12, padding: "14px 16px", marginTop: 12, fontSize: 13, color: "#92400E", lineHeight: 1.5 }}>
                ⚠️ <strong>All blends are FODMAP-safe.</strong> Never add garlic powder, onion powder, or onion flakes to any blend. Garlic flavor comes from garlic-infused olive oil (used as cooking oil).
              </div>
            </div>

            {/* The Daily Shelf */}
            <div style={{ marginBottom: 28 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#3D3427", marginBottom: 8, paddingBottom: 4, borderBottom: "2px solid #E8E0D5" }}>
                The Daily Shelf
              </div>
              <div style={{ fontSize: 14, color: "#5C5040", lineHeight: 1.7 }}>
                Designate one shelf or bin in the fridge as today's food. Each day, load it with <strong>4 containers + snacks</strong> (berries, yogurt, nuts, rice cakes). Eat from the shelf when hungry. When the shelf is empty, the day's food is done. No counting, no tracking.
              </div>
            </div>
          </div>
        )}

        {/* SETTINGS */}
        {screen === "settings" && (
          <div>
            <h2 style={{ fontSize: 18, fontWeight: 700, color: "#3D3427", margin: "0 0 4px" }}>Settings</h2>
            <p style={{ fontSize: 14, color: "#8B7E6A", margin: "0 0 24px" }}>Set up once with your partner. Changes what meals appear.</p>

            <div style={{ marginBottom: 28 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#3D3427", marginBottom: 12 }}>Protein Preferences</div>
              <p style={{ fontSize: 13, color: "#8B7E6A", marginBottom: 12 }}>Toggle off proteins you don't want. Those meals leave the rotation.</p>
              {proteinOptions.map(p => {
                const excluded = settings.excludedProteins.includes(p);
                return (
                  <button key={p} onClick={() => {
                    const next = excluded ? settings.excludedProteins.filter(x=>x!==p) : [...settings.excludedProteins, p];
                    saveSettings({ ...settings, excludedProteins: next });
                  }} style={{
                    display: "flex", alignItems: "center", width: "100%", padding: "12px 14px",
                    marginBottom: 6, borderRadius: 10, background: excluded?"#FEE2E2":"#E8F5E9",
                    border: "none", cursor: "pointer", fontSize: 15, fontWeight: 600,
                    color: excluded?"#991B1B":"#166534",
                  }}>
                    <span style={{ marginRight: 10, fontSize: 18 }}>{excluded?"✗":"✓"}</span>
                    {p.charAt(0).toUpperCase()+p.slice(1)}
                  </button>
                );
              })}
            </div>

            <div style={{ marginBottom: 28 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#3D3427", marginBottom: 12 }}>Active Meals</div>
              <div style={{ background: "#F5F0EB", borderRadius: 12, padding: 16, fontSize: 14, color: "#5C5040", lineHeight: 1.6 }}>
                <strong>33 meals</strong> in the system<br/>
                <strong>{ALL_MEALS.filter(m=>!settings.excludedProteins.includes(m.proteinType)).length} meals</strong> active after your preferences<br/>
                <strong>~{Math.round(ALL_MEALS.filter(m=>!settings.excludedProteins.includes(m.proteinType)).reduce((s,m)=>s+m.cal,0)/ALL_MEALS.filter(m=>!settings.excludedProteins.includes(m.proteinType)).length)} cal</strong> average per container
              </div>
            </div>

            <div style={{ marginBottom: 28 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#3D3427", marginBottom: 12 }}>Seasoning Blends</div>
              {Object.values(BLENDS).map(b => (
                <div key={b.name} style={{
                  display: "flex", alignItems: "center", padding: "10px 14px",
                  marginBottom: 6, borderRadius: 10, background: b.bg,
                }}>
                  <span style={{ fontSize: 20, marginRight: 10 }}>{b.emoji}</span>
                  <span style={{ fontSize: 15, fontWeight: 600, color: b.color }}>{b.name}</span>
                </div>
              ))}
            </div>

            <button onClick={newWeek} style={{
              width: "100%", padding: "14px", background: "#2D6A4F", color: "#fff",
              border: "none", borderRadius: 12, fontSize: 15, fontWeight: 700, cursor: "pointer",
            }}>🔀 Generate New Week</button>

            <div style={{ marginTop: 20, padding: 16, background: "#FEF3C7", borderRadius: 12, fontSize: 13, color: "#92400E", lineHeight: 1.5 }}>
              ⚠️ Generating a new week clears the current rotation and shopping list checkmarks.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
